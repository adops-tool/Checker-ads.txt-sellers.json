<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ads.txt Line Validator</title>
  <link rel="stylesheet" href="validator.css">
</head>
<body>
  <h2>Ads.txt / App-ads.txt Line Checker</h2>
  <div class="container">
    <div class="settings-bar">
      <div>
        <label>File Type:</label>
        <select id="fileType">
          <option value="app-ads.txt">app-ads.txt</option>
          <option value="ads.txt">ads.txt</option>
          <option value="url">URL (direct link)</option>
        </select>
      </div>
      <div>
        <label>Filter:</label>
        <select id="viewMode">
          <option value="all">Show All Results</option>
          <option value="errors">Errors / Warnings Only</option>
        </select>
      </div>
      <div>
        <label>Layout:</label>
        <select id="tableLayout">
          <option value="standard">Standard</option>
          <option value="grouped">Grouped by Target</option>
        </select>
      </div>
      <div>
        <label>Batch Size:</label>
        <select id="batchSize">
          <option value="2">2</option>
          <option value="5" selected>5</option>
          <option value="10">10</option>
          <option value="20">20</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label id="targetLabel">Target Websites</label>
        <textarea id="targetList" placeholder="example.com&#10;another-site.com"></textarea>
      </div>
      <div class="col">
        <label>Reference Lines</label>
        <textarea id="refList" placeholder="google.com, pub-1234, DIRECT&#10;adnetwork.com, 9876, RESELLER"></textarea>
      </div>
    </div>
    <div class="button-row">
      <button id="runBtn">Start Validation</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>
    <div class="progress-container" id="progressContainer">
      <div id="progressBar"></div>
    </div>
    <div class="status-bar" id="statusText">Ready</div>
    <div class="stats-bar" id="statsBar"></div>
    <div class="table-wrapper">
      <table id="resultsTable">
        <thead id="resultsHead">
          <tr>
            <th>Target URL</th>
            <th>Reference</th>
            <th>Result</th>
            <th>Details</th>
            <th>Owner</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="button-row">
      <button id="downloadBtn">Download CSV</button>
      <button id="copyBtn">Copy to Clipboard</button>
    </div>
  </div>
  <script src="validator.js"></script>
</body>
</html>

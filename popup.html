<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>adWMG Checker: ads.txt/sellers.json</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header-container">
    <div class="tabs">
      <div id="seller-tab" class="tab active">
        <span class="tab-text">sellers.json</span>
        <span id="seller-line-count" class="line-count"></span>
      </div>
      <div id="ads-tab" class="tab">
        <span class="tab-text">ads.txt</span>
        <span id="ads-line-count" class="line-count"></span>
      </div>
      <div id="appads-tab" class="tab">
        <span class="tab-text">app-ads.txt</span>
        <span id="appads-line-count" class="line-count"></span>
      </div>
    </div>
    <div id="settings-toggle" class="settings-toggle" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </div>
  </div>

  <div id="settings-panel" class="settings-panel" style="display: none;">
    <div class="settings-card">
      <div class="settings-header">
        <h3 class="settings-title">Extension Settings</h3>
        <button id="close-settings" class="settings-close-btn" title="Close settings">✕</button>
      </div>

      <div class="settings-group">
        <label for="sellers-url-input">Sellers.json URL</label>
        <input type="text" id="sellers-url-input" placeholder="https://adwmg.com/sellers.json" />
      </div>

      <div class="settings-group settings-switch-group">
        <label class="switch-row" for="auto-close-settings-input">
          <span>Close settings on tab switch</span>
          <input id="auto-close-settings-input" type="checkbox" />
        </label>
        <label class="switch-row" for="persist-filter-input">
          <span>Remember filter state</span>
          <input id="persist-filter-input" type="checkbox" />
        </label>
        <label class="switch-row" for="highlight-own-domain-input">
          <span>Highlight current domain in sellers list</span>
          <input id="highlight-own-domain-input" type="checkbox" />
        </label>
      </div>

      <div class="settings-actions-inline">
        <button id="save-settings">Save Settings</button>
        <button id="force-refresh-cache" title="Force sync: bypass cache">Clear Cache & Sync</button>
      </div>

      <hr class="settings-divider" />

      <div class="settings-group">
        <label>Additional Tools</label>
        <button id="open-validator-btn" class="tool-btn">Open Line Validator Window</button>
      </div>
    </div>
  </div>

  <div id="filter-area" class="filter-area">
    <div id="filter-left-section" class="filter-left-section">
      <div id="link-block" class="link-block"></div>
      <div id="filter-status-text" class="filter-status-text">Show only adwmg</div>
    </div>
    <div id="status-container" class="status-container">
      <div id="file-date" class="status-date"></div>
      <div class="badges-row">
        <div id="owner-badge" class="badge"></div>
        <div id="manager-badge" class="badge"></div>
      </div>
    </div>
  </div>

  <div id="output" class="output">Loading...</div>

  <div class="footer">
    <a href="https://adwmg.com" target="_blank" class="footer-link">
      <span>Powered by adWMG: Programmatic Monetization Company</span>
      <img src="icons/iconlogo.png" alt="logo" class="footer-icon" />
    </a>
  </div>

  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
